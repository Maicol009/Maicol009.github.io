<!DOCTYPE html>
<html lang="it">
<head>
   <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnneEmme Studio | Dashboard</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER PULITO: LOGO A SINISTRA, TESTO A DESTRA */
        .header-container {
            width: 100%;
            max-width: 1100px;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 40px;
        }

        .logo-wrapper {
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--yt-red);
            object-fit: cover;
            display: block;
            background-color: #333; /* Grigio se l'immagine non carica */
        }

        .text-wrapper h1 {
            font-size: clamp(3rem, 10vw, 5.5rem); /* Si adatta allo schermo */
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
        }

        .text-wrapper p {
            font-size: 1.4rem;
            color: #777;
            margin-top: 10px;
        }

        /* DASHBOARD INFO */
        .content {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }

        .info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border-left: 5px solid var(--yt-red);
        }

        .stat-box span { display: block; }
        .stat-label { color: #666; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; }
        .stat-number { font-size: 3.5rem; font-weight: bold; margin-top: 10px; }

        /* VIDEO */
        .video-section {
            background: #111;
            padding: 40px;
            border-radius: 30px;
            margin-bottom: 60px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 25px 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 15px;
        }

        .sub-button {
            display: inline-block;
            background: white;
            color: black;
            padding: 18px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .sub-button:hover { background: var(--yt-red); color: white; }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="Logo EnneEmme" id="main-logo">
        </div>
        <div class="text-wrapper">
            <h1>EnneEmme<br>Studio</h1>
            <p>Digital Content Creator</p>
        </div>
    </header>

    <main class="content">
        <div class="info-row">
            <div class="stat-box">
                <span class="stat-label">Iscritti attuali</span>
                <span class="stat-number">48</span>
            </div>
            
        </div>

        <div class="video-section">
            <h2>Ultimo Video: Dream</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/VOvjL2st19M" frameborder="0" allowfullscreen></iframe>
            </div>
            <a href="https://www.youtube.com/channel/UCfceVpsEI4mrCA-Hk9WvQHg" target="_blank" class="sub-button">ISCRIVITI ORA</a>
        </div>
    </main>

</body>
</html>
